___&quot;~u69ee2bf1-5dbd-4e70-9de2-3610d5e80227logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[175,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;# Anthropic 亲自下场教 Claude Code：最值钱的技能是 rewind\\n\\nlogseq____&gt; Source: https://mp.weixin.qq.com/s/LCB9W65Il3RhDlVLXGdvxg\\nlogseq____&gt; Collected: 2026-04-25\\nlogseq____&gt; Published: Unknown\\n\\nAnthropic Claude Code 团队的 Thariq 发文，系统讲解 1M context 上线后 session 管理的方法论——5 个核心动作的决策树：Continue、Rewind、Clear、Compact、Subagent。其中 Rewind 被点名为最值得养成的习惯。\\n\\n---\\n\\n在小说阅读器读本章\\n\\n去阅读\\n\\n在小说阅读器中沉浸阅读\\n\\nThariq 原帖：3 小时 1.7K 赞、16 万浏览\\n\\n刚刚，Claude Code 团队的 Thariq（@trq212）发了一篇文章——不是发布新功能，而是发了一份\\logseq____&quot;使用手册\\logseq____&quot;。\\n\\n3 小时拿下 1500+ 点赞、150 多次转发，评论区被 \\logseq____&quot;rewind feels immediately useful\\logseq____&quot; 这种留言刷屏。\\n\\n注意，这种\\logseq____&quot;教你怎么用\\logseq____&quot;的长帖，Anthropic 官方很少自己下场写。\\n\\n01logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[175,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[175,logseq____&quot;^Flogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[175,logseq____&quot;^Xlogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[175,logseq____&quot;^Vlogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[175,logseq____&quot;^Ulogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[175,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;,logseq____&quot;^17logseq____&quot;,1],536870921]],[logseq____&quot;^15logseq____&quot;,[175,logseq____&quot;^Jlogseq____&quot;,[],536870921]],[logseq____&quot;^15logseq____&quot;,[175,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u69ee2bf1-c95f-43b1-acf5-a806744d2ad7logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[176,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;## 罕见的下场\\n\\n平时讲 Claude Code 怎么用的，都是社区 KOL、第三方教程作者、油管 up 主。官方只管发布新功能，不管你怎么用。\\n\\n这次反过来了。\\n\\nThariq 一上来交代得很清楚：这篇是被客户对话逼出来的。\\n\\n\\logseq____&quot;What came up again and again in these calls is that there is a lot of variance in how you might manage your sessions, especially with our new update to 1 million context in Claude Code.\\logseq____&quot;\\n\\n翻译过来就是：1M context 上线之后，他们发现一件让产品团队挠头的事——同样一台 Claude Code，不同人用法差到不像同一个产品。有人开一个 session 用一整天，有人每条 prompt 都开新 session，有人疯狂用 compact，有人完全不知道有 rewind 这回事。\\n\\n1M 把这种差异放大了。\\n\\n之前 200K 的时候，session 太长会自动撞墙，谁用得糙、谁用得精，最后都得 compact 或 clear，差距没那么离谱。1M 一来，糙的人可以把整本垃圾塞进去几小时不爆，精的人能在同样时间里把 5 个独立任务跑完——同样一份订阅，产出差出来一个量级。\\n\\n所以官方坐不住了，下场写手册。\\n\\n02logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[176,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[176,logseq____&quot;^Flogseq____&quot;,175,536870921]],[logseq____&quot;^15logseq____&quot;,[176,logseq____&quot;^Xlogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[176,logseq____&quot;^Vlogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[176,logseq____&quot;^Ulogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[176,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;,logseq____&quot;^17logseq____&quot;,2],536870921]],[logseq____&quot;^15logseq____&quot;,[176,logseq____&quot;^Jlogseq____&quot;,[],536870921]],[logseq____&quot;^15logseq____&quot;,[176,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u69ee2bf1-6a8a-43bd-bc41-8ea1e2e907dblogseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[177,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;## 五岔路口\\n\\n文章的核心其实就一张图：每次 Claude 停下，你都站在一个 5 岔路口。\\n\\n每条消息发完后的五岔路口（图：Anthropic 官方）\\n\\nThariq 把这五个动作排成并列：\\n\\n\\logseq____&quot;While the most natural is just to continue, the other four options exist to help manage your context.\\logseq____&quot;\\n\\n换句话说：直接 continue 是默认动作，剩下四个全都是为了管理上下文而存在的。\\n\\n• Continue —— 继续在同一个 session 里发下一条。最舒服，但也最贵\\n\\n• /rewind（双击 esc）—— 跳回某条历史消息，从那里重发。中间的对话都丢掉\\n\\n• /clear —— 关掉这个 session，开个全新的，把你需要带过去的东西自己写一段 brief\\n\\n• Compact —— 让 Claude 自己把对话总结成一段，然后在总结之上继续\\n\\n• Subagents —— 把下一块工作甩给一个有自己干净 context 的子 agent，只把它的结论拿回来\\n\\n读完这五条，你会发现一件反直觉的事：这不是五个并列的功能，这是一个决策树。\\n\\nThariq 之所以能写这篇文章，正是因为他每天都在心里跑这个决策树。普通用户每天跑的是另一个决策树：\\logseq____&quot;要不要重新打开 Claude Code\\logseq____&quot;。\\n\\n差别就在这。\\n\\n03logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[177,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[177,logseq____&quot;^Flogseq____&quot;,176,536870921]],[logseq____&quot;^15logseq____&quot;,[177,logseq____&quot;^Xlogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[177,logseq____&quot;^Vlogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[177,logseq____&quot;^Ulogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[177,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;,logseq____&quot;^17logseq____&quot;,2],536870921]],[logseq____&quot;^15logseq____&quot;,[177,logseq____&quot;^Jlogseq____&quot;,[],536870921]],[logseq____&quot;^15logseq____&quot;,[177,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u69ee2bf1-a19f-4f1f-98f8-935b4547ebbblogseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[178,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;## Rewind 上位\\n\\n整篇文章里，最不藏着掖着的一句话是这条：\\n\\n\\logseq____&quot;If I had to pick one habit that signals good context management, itlogseq____&apos;s rewind.\\logseq____&quot;\\n\\n如果让我挑一个习惯来判断一个人会不会管 context，那就是 rewind。\\n\\n这句话说得很重。重到让人想问：为什么是 rewind，而不是 compact，不是 subagent？\\n\\nThariq 给了一个具体场景。\\n\\nClaude 读了 5 个文件，试了一个方案，没成。你的本能反应是接着发一条：\\logseq____&quot;那个不行，换 X 试试。\\logseq____&quot;\\n\\n听起来很合理对吧？但 Thariq 说这是错的。\\n\\nCorrecting 是接着说\\logseq____&quot;再试 X\\logseq____&quot;，Rewinding 是 esc esc 把失败那段从 context 里切掉（图：Anthropic 官方）\\n\\n正确动作是：双击 esc，跳回到 Claude 刚读完那 5 个文件、还没动手的那个时刻，然后把你刚学到的教训直接写进 prompt：\\n\\n\\logseq____&quot;别用方案 A，foo 模块根本没暴露那个接口——直接走 B。\\logseq____&quot;\\n\\n为什么这样更好？因为你刚才那条失败的尝试、它读过的中间结果、它走错的死胡同——全都还堆在 context 里。Claude 接下来每生成一个 token，都得多扛着这堆垃圾过一遍 attention。\\n\\nrewind 不是回滚，是减法。\\n\\n你把\\logseq____&quot;刚才那次失败\\logseq____&quot;这一整段，从 Claude 的记忆里切掉了。它接下来面对的是一个干净的状态：5 个文件 + 你的新指令。\\n\\nThariq 还提了一个进阶玩法：\\logseq____&quot;summarize from here\\logseq____&quot;——让 Claude 在 rewind 前先写一段\\logseq____&quot;我刚才试了什么、哪里卡住、学到了什么\\logseq____&quot;，相当于给\\logseq____&quot;过去的自己\\logseq____&quot;留一封信，然后再 rewind 回去把这封信塞进新 prompt。\\n\\nClaude 给 Claude 写交接文档。听起来荒诞，但完全说得通。\\n\\n评论区一个叫 mike 的用户的反应很代表：\\n\\n\\logseq____&quot;rewind feels immediately useful.\\logseq____&quot;\\n\\n注意这个 immediately。不是\\logseq____&quot;我去试试看\\logseq____&quot;，是\\logseq____&quot;我立刻就能想到该用在哪\\logseq____&quot;。一个好功能的标志，就是用户读到说明的那一刻就在脑子里 replay 自己昨天的一次失败。\\n\\n04logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[178,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[178,logseq____&quot;^Flogseq____&quot;,177,536870921]],[logseq____&quot;^15logseq____&quot;,[178,logseq____&quot;^Xlogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[178,logseq____&quot;^Vlogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[178,logseq____&quot;^Ulogseq____&quot;,174,536870921]],[logseq____&quot;^15logseq____&quot;,[178,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;,logseq____&quot;^17logseq____&quot;,2],536870921]],[logseq____&quot;^15logseq____&quot;,[178,logseq____&quot;^Jlogseq____&quot;,[],536870921]],[logseq____&quot;^15logseq____&quot;,[178,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u69ee2bf1-4c7e-4272-84ee-9e1f81e6139elogseq____&quot;,536870921]],[logseq____&quot;^15logseq____&quot;,[179,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;## compact vs clear\\n\\n接下来 Thariq 处理另一对很容易搞混的动作：compact 和 clear。\ ytes | 35 GB |\\n\\n一张 A100 HBM 显存 80GB，FP16 的 70B 模型需要 140GB，解法：量化压缩（INT8/INT4）或多卡分担（Tensor Parallelism）。logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[369,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[369,logseq____&quot;^Flogseq____&quot;,364,536870927]],[logseq____&quot;^15logseq____&quot;,[369,logseq____&quot;^Xlogseq____&quot;,362,536870927]],[logseq____&quot;^15logseq____&quot;,[369,logseq____&quot;^Vlogseq____&quot;,362,536870927]],[logseq____&quot;^15logseq____&quot;,[369,logseq____&quot;^Ulogseq____&quot;,362,536870927]],[logseq____&quot;^15logseq____&quot;,[369,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u69ee2bf1-9d24-43c4-868b-4ed6abdab193logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[370,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;## 3 Decode 逐 Token 生成\\n\\n每生成 1 个 Token 的完整循环：\\n1. GPU 读取全部模型权重（140GB），计算下一个 Token 的概率分布（logits）\\n2. logits 通过 PCIe 传回 CPU\\n3. CPU 执行采样策略（Temperature、Top-P 等），选出最终 Token\\n4. CPU 将 Token ID 送回 GPU，开始下一轮\\n\\nCPU 在 Decode 阶段扮演\\logseq____&quot;调度员 + 裁判\\logseq____&quot;角色：采样、请求调度（批处理）、KV Cache 内存管理、决定何时停止生成（EOS token）。\\n\\n**为什么这么慢？**\\n\\n| 指标 | Decode 阶段 | 说明 |\\n|------|------------|------|\\n| 算力利用率 | ~5% | Tensor Core 严重闲置 |\\n| 带宽利用率 | ~95% | HBM 几乎被打满 |\\n| 瓶颈类型 | **Memory-bound** | 数据搬运是瓶颈，计算够用 |\\n\\n每步都要把全部模型权重（140GB）从 HBM 读一遍，但只做了极少量的计算。Tensor Core 大部分时间在干等 HBM 送数据——就像打字速度极快的打字员，但每打一个字之前都要等快递把键盘送来。logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[370,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[370,logseq____&quot;^Flogseq____&quot;,366,536870927]],[logseq____&quot;^15logseq____&quot;,[370,logseq____&quot;^Xlogseq____&quot;,362,536870927]],[logseq____&quot;^15logseq____&quot;,[370,logseq____&quot;^Vlogseq____&quot;,362,536870927]],[logseq____&quot;^15logseq____&quot;,[370,logseq____&quot;^Ul ____&quot;^Flogseq____&quot;,686,536870940]],[logseq____&quot;^15logseq____&quot;,[689,logseq____&quot;^Xlogseq____&quot;,679,536870940]],[logseq____&quot;^15logseq____&quot;,[689,logseq____&quot;^Vlogseq____&quot;,679,536870940]],[logseq____&quot;^15logseq____&quot;,[689,logseq____&quot;^Ulogseq____&quot;,679,536870940]],[logseq____&quot;^15logseq____&quot;,[689,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u69ee2bf2-9a27-4f03-bbc6-62d4aeaca47dlogseq____&quot;,536870940]],[logseq____&quot;^15logseq____&quot;,[690,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;## KV Cache\\n\\n每个 Token 的 K/V 向量缓存在 GPU 显存中，随序列长度线性增长。\\n\\n| 架构 | KV 头数 | 4K | 32K | 128K |\\n|------|--------|-----|-----|------|\\n| 无 GQA | 64 | ~10 GB | ~80 GB | ~320 GB |\\n| GQA | 8 | ~1.3 GB | ~10 GB | ~40 GB |\\n\\nGQA（分组查询注意力）将 KV 头数从 64 减到 8，KV Cache 压缩到 1/8。128K 上下文时 70B 模型总计 180GB，需 3 张 A100。\\n\\n**PagedAttention**（vLLM）：将 KV Cache 按页管理（类似 OS 虚拟内存），多请求共享显存，大幅提升吞吐量。logseq____&quot;,536870940]],[logseq____&quot;^15logseq____&quot;,[690,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870940]],[logseq____&quot;^15logseq____&quot;,[690,logseq____&quot;^Flogseq____&quot;,693,536870940]],[logseq____&quot;^15logseq____&quot;,[690,logseq____&quot;^Xlogseq____&quot;,679,536870940]],[logseq____&quot;^15logseq____&quot;,[690,logseq____&quot;^Vlogseq____&quot;,679,536870940]],[logseq____&quot;^15logseq____&quot;,[690,logseq____&quot;^Ulogseq____&quot;,679,536870940]],[logseq____&quot;^15logseq____&quot;,[690,logseq____&quot;^?logseq____&quot;,[logseq____&quot;^ logseq____&quot;,logseq____&quot;^17logseq____&quot;,2],536870940]],[logseq____&quot;^15logseq____&quot;,[690,logseq____&quot;^Jlogseq____&quot;,[],536870940]],[logseq____&quot;^15logseq____&quot;,[690,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u69ee2bf2-bf98-4f63-8089-b12f9055f8f4logseq____&quot;,536870940]],[logseq____&quot;^15logseq____&quot;,[691,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;## 六步       // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      }(window.location))</script>
